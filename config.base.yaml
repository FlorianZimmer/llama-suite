COMMON_FLAGS: &COMMON_CMD
  flash-attn: true
  cache-type-k: q8_0
  cache-type-v: q8_0

QWEN3_SAMPLING: &QWEN3_SAMPLING
  temp: 0.6
  min-p: 0.0
  top-p: 0.95
  top-k: 20

QWEN3_SAMPLING: &QWEN3_INSTRUCT_SAMPLING
  temp: 0.7
  min-p: 0.0
  top-p: 0.8
  top-k: 20

QWEN3_SAMPLING: &QWEN25_SAMPLING
  temp: 0.7
  min-p: 0.0
  top-p: 0.8
  repeat-penalty: 1.05

GEMMA_SAMPLING: &GEMMA_SAMPLING
  temp: 1.0
  min-p: 0.01
  top-p: 0.95
  top-k: 64
  repeat-penalty: 1.0

MISTRAL_SAMPLING: &MISTRAL_SAMPLING
  temp: 0.15

MISTRAL_SAMPLING: &MISTRAL_THINKING_SAMPLING
  temp: 0.7
  top-p: 0.95

QWQ_SAMPLING: &QWQ_SAMPLING
  temp: 0.6
  min-p: 0.0
  top-p: 0.95
  top-k: 40
  repeat-penalty: 1.1
  dry-multiplier: 0.5
  samplers: top_k;top_p;min_p;temperature;dry;typ_p;xtc

GLM_SAMPLING: &GLM_SAMPLING
  temp: 0.6
  min-p: 0.0
  top-p: 0.95
  top-k: 20

GLM_SAMPLING: &GPTOSS
  temp: 1
  top-p: 1.0
  top-k: 0

healthCheckTimeout: 60

logLevel: info

models:
  Qwen3-8B-Q4_K_M:
    hf_tokenizer_for_model: Qwen/Qwen3-8B
    supports_no_think_toggle: true
    sampling: *QWEN3_SAMPLING
    aliases: [Qwen3-8B-NoThink]
    cmd:
      <<: *COMMON_CMD
      bin:  llama.cpp/build/bin/llama-server
      port: ${PORT}
      model: ./models/Qwen3-8B-Q4_K_M.gguf
      ctx-size: 16384
      gpu-layers: auto
      threads:    auto
      reasoning-format: deepseek
      parallel: 1

