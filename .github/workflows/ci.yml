name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev extras
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest -q

  advisory-quality:
    name: Advisory Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and dev extras
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Ruff
        run: |
          set +e
          python -m ruff check src tools --output-format=github
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::warning title=Ruff advisory::Ruff reported issues in src/tools. This lane is advisory and does not block CI."
          fi
          exit 0

      - name: Mypy
        run: |
          set +e
          python -m mypy src/llama_suite
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::warning title=Mypy advisory::Mypy reported typing issues in src/llama_suite. This lane is advisory and does not block CI."
          fi
          exit 0
