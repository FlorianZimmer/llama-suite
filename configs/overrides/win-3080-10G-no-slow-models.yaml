# overrides/windows-rtx3080.yaml

COMMON_FLAGS:
  gpu-layers: 99
  threads: 28

models:
  # For all models, if the binary path is consistently different on Windows:
  # You could use a YAML alias here if you want to set it for many models,
  # or repeat it, or handle it in the python script if platform.system() == "Windows".
  # For now, let's assume the base config has a path that might work or you adjust it per model if needed.
  # If all binaries are in the same relative place but end with .exe:
  # SomeModel:
  #   cmd:
  #     bin: ./llama.cpp/build/bin/llama-server.exe # Example

  gpt-oss-120b-Q4-med:
    disabled: true

  gpt-oss-20b-Q8-med:
    cmd:
      n-cpu-moe: 10

  GLM-4.5-Air-Q3:
    cmd:
      n-cpu-moe: 44

  ERNIE-4.5-21B-A3B:
    cmd:
      n-cpu-moe: 16

# The top-level keys like healthCheckTimeout, logLevel, and profiles from your
# llama-swap native config are NOT currently handled by llama_swap_watch.py.
# llama_swap_watch.py focuses on generating the model command strings for a
# single llama-swap instance's "models" section.
# If you need those, llama_swap_watch.py would need to be extended to read them
# and pass them when it calls the actual llama-swap executable, or llama-swap
# would need to read its own separate config for those global settings.
# For now, this override only affects the 'models' part that llama_swap_watch.py processes.
